<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selecciona tu personaje</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .personaje {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            width: 220px;
            transition: 0.3s;
        }

        .personaje:hover {
            transform: scale(1.05);
            background: #333;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #00aaff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0088cc;
        }
    </style>
</head>

<body>

    <h1>Selecciona tu personaje</h1>

    <div class="contenedor">

        <div class="personaje">
            <h2>Diddy</h2>
            <img src="assets/IMG/diddy.jpg">
            <button onclick="window.location.href='diddy.bat'">Jugar</button>
        </div>

        <div class="personaje">
            <h2>Charlie</h2>
            <img src="assets/IMG/charlie.jpg">
            <button onclick="window.location.href='charlie.bat'">Jugar</button>
        </div>

        <div class="personaje">
            <h2>George</h2>
            <img src="assets/IMG/george.jpg">
            <button onclick="window.location.href='george.bat'">Jugar</button>
        </div>

        <div class="personaje">
            <h2>jeffrey</h2>
            <img src="assets/IMG/jeffrey.jpg">
            <button onclick="window.location.href='jeffrey.bat'">Jugar</button>
        </div>

    </div>

</body>
</html>
